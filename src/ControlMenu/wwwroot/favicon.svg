<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4d9fff"/>
      <stop offset="100%" stop-color="#0d6efd"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Outer gear ring -->
  <circle cx="256" cy="256" r="140" fill="none" stroke="url(#accent)" stroke-width="24" opacity="0.3"/>
  <!-- Gear teeth (8 teeth) -->
  <g fill="url(#accent)" opacity="0.5">
    <rect x="244" y="88" width="24" height="40" rx="6"/>
    <rect x="244" y="384" width="24" height="40" rx="6"/>
    <rect x="88" y="244" width="40" height="24" rx="6"/>
    <rect x="384" y="244" width="40" height="24" rx="6"/>
    <rect x="140" y="128" width="24" height="40" rx="6" transform="rotate(-45 152 148)"/>
    <rect x="348" y="128" width="24" height="40" rx="6" transform="rotate(45 360 148)"/>
    <rect x="140" y="344" width="24" height="40" rx="6" transform="rotate(45 152 364)"/>
    <rect x="348" y="344" width="24" height="40" rx="6" transform="rotate(-45 360 364)"/>
  </g>
  <!-- Inner circle (hub) -->
  <circle cx="256" cy="256" r="64" fill="none" stroke="url(#accent)" stroke-width="16"/>
  <!-- Three horizontal control lines -->
  <g stroke="#e0e0e0" stroke-width="10" stroke-linecap="round">
    <line x1="208" y1="232" x2="304" y2="232"/>
    <line x1="216" y1="256" x2="296" y2="256"/>
    <line x1="208" y1="280" x2="304" y2="280"/>
  </g>
  <!-- Slider dots on the lines -->
  <circle cx="260" cy="232" r="8" fill="#4d9fff"/>
  <circle cx="240" cy="256" r="8" fill="#4d9fff"/>
  <circle cx="272" cy="280" r="8" fill="#4d9fff"/>
</svg>
